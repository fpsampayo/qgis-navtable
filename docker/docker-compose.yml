services:
  qgis:
    image: qgis/qgis:3.44
    container_name: qgis_navtable
    command: qgis
    environment:
      - DISPLAY=unix$DISPLAY
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ../src/NavTable:/root/.local/share/QGIS/QGIS3/profiles/default/python/plugins/NavTable
      - ./QGIS3.ini:/root/.local/share/QGIS/QGIS3/profiles/default/QGIS/QGIS3.ini
